services:
  postgres:
    image: postgres:16
    container_name: nurliya-postgres
    environment:
      POSTGRES_USER: nurliya
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nurliya123}
      POSTGRES_DB: nurliya
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nurliya"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: nurliya-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: nurliya
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-nurliya123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  scraper:
    build:
      context: ./google-maps-scraper
      dockerfile: Dockerfile
    container_name: nurliya-scraper
    command: ["-web", "-addr", ":8080", "-data-folder", "/data"]
    volumes:
      - scraper_data:/data
    healthcheck:
      disable: true
    restart: unless-stopped

  api:
    build:
      context: ./pipline
      dockerfile: Dockerfile
    container_name: nurliya-api
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      # GCP Secret Manager (optional - secrets fetched at runtime if enabled)
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      USE_SECRET_MANAGER: ${USE_SECRET_MANAGER:-false}
      # Database & Queue (constructed from passwords)
      DATABASE_URL: postgresql://nurliya:${DB_PASSWORD:-nurliya123}@postgres:5432/nurliya
      RABBITMQ_URL: amqp://nurliya:${RABBITMQ_PASSWORD:-nurliya123}@rabbitmq:5672/
      SCRAPER_API_URL: http://scraper:8080
      # LLM
      VLLM_BASE_URL: ${VLLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      VLLM_API_KEY: ${VLLM_API_KEY}
      VLLM_MODEL: ${VLLM_MODEL:-gemini-2.0-flash}
      RESULTS_DIR: /app/results
      # Email
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      # Auth
      JWT_SECRET: ${JWT_SECRET:-nurliya-jwt-change-in-production}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - results_data:/app/results
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      scraper:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ./pipline
      dockerfile: Dockerfile
    command: ["python", "worker.py"]
    environment:
      # GCP Secret Manager (optional - secrets fetched at runtime if enabled)
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      USE_SECRET_MANAGER: ${USE_SECRET_MANAGER:-false}
      # Database & Queue
      DATABASE_URL: postgresql://nurliya:${DB_PASSWORD:-nurliya123}@postgres:5432/nurliya
      RABBITMQ_URL: amqp://nurliya:${RABBITMQ_PASSWORD:-nurliya123}@rabbitmq:5672/
      # LLM
      VLLM_BASE_URL: ${VLLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      VLLM_API_KEY: ${VLLM_API_KEY}
      VLLM_MODEL: ${VLLM_MODEL:-gemini-2.0-flash}
      # Email
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 2

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${DASHBOARD_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_WS_URL=${DASHBOARD_WS_URL:-ws://localhost:8000/ws}
    container_name: nurliya-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  client-portal:
    build:
      context: ./client-portal
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${CLIENT_PORTAL_API_URL:-https://api.nurliya.com}
    container_name: nurliya-client-portal
    ports:
      - "3002:3000"
    depends_on:
      - api
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nurliya-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nurliya.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-nurliya123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  scraper_data:
  results_data:
  pgadmin_data:

# For Linux hosts, add this to access host's vLLM:
# extra_hosts:
#   - "host.docker.internal:host-gateway"
